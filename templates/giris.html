<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap — Borsa AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:#0a1628; --navy2:#0f2040;
            --gold:#c9a84c; --gold2:#e8c96b;
            --green:#22c55e; --red:#ef4444;
            --text:#e8edf5; --muted:#7a8899;
            --card:rgba(255,255,255,0.04);
            --border:rgba(201,168,76,0.18);
            --input:rgba(255,255,255,0.06);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--navy); color:var(--text);
            font-family:'DM Sans',sans-serif;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            padding:2rem 1rem;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:radial-gradient(ellipse 60% 60% at 30% 30%, rgba(201,168,76,0.06) 0%, transparent 60%);
            pointer-events:none;
        }
        .wrap { width:100%; max-width:420px; position:relative; z-index:1; }
        .logo { text-align:center; margin-bottom:2rem; }
        .logo a { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700; color:var(--gold); text-decoration:none; }
        .logo p { color:var(--muted); font-size:0.85rem; margin-top:0.4rem; }
        .card {
            background:rgba(15,32,64,0.7);
            border:1px solid var(--border);
            border-radius:18px; padding:2.25rem;
            backdrop-filter:blur(12px);
        }
        .card h2 { font-family:'Playfair Display',serif; font-size:1.6rem; margin-bottom:0.4rem; }
        .card .sub { color:var(--muted); font-size:0.88rem; margin-bottom:2rem; }
        .form-group { margin-bottom:1.1rem; }
        label { display:block; font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; margin-bottom:0.5rem; }
        input[type="email"], input[type="password"], input[type="text"] {
            width:100%; background:var(--input);
            border:1.5px solid rgba(255,255,255,0.08);
            border-radius:10px; padding:0.8rem 1rem;
            color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem;
            outline:none; transition:border-color 0.2s;
        }
        input:focus { border-color:var(--gold); background:rgba(201,168,76,0.05); }
        input::placeholder { color:var(--muted); }
        .btn-submit {
            width:100%; padding:0.9rem;
            background:linear-gradient(135deg,var(--gold),#b8922f);
            color:#0a1628; font-size:1rem; font-weight:700;
            border:none; border-radius:10px; cursor:pointer;
            transition:all 0.2s; margin-top:0.5rem;
        }
        .btn-submit:hover { opacity:0.92; transform:translateY(-1px); }
        .divider { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
        .divider span { color:var(--muted); font-size:0.78rem; white-space:nowrap; }
        .btn-google {
            width:100%; padding:0.8rem;
            background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.1);
            border-radius:10px; color:var(--text); font-size:0.92rem; font-weight:600;
            cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:0.6rem;
            text-decoration:none;
        }
        .btn-google:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); }
        .error {
            background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3);
            border-radius:8px; padding:0.7rem 1rem; color:#f87171;
            font-size:0.85rem; margin-bottom:1.25rem;
        }
        .footer-links { text-align:center; margin-top:1.5rem; font-size:0.85rem; color:var(--muted); }
        .footer-links a { color:var(--gold); text-decoration:none; font-weight:600; }
        .footer-links a:hover { color:var(--gold2); }
        .back { display:block; text-align:center; margin-top:1rem; color:var(--muted); font-size:0.82rem; text-decoration:none; }
        .back:hover { color:var(--text); }
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <a href="/">📈 BorsaAI</a>
        <p>BIST için yapay zekâ destekli analiz</p>
    </div>
    <div class="card">
        <h2>Tekrar hoş geldin</h2>
        <p class="sub">Hesabına giriş yap ve analize devam et</p>

        {% if hata %}
        <div class="error">⚠️ {{ hata }}</div>
        {% endif %}

        <form method="POST" action="/giris">
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" name="email" placeholder="ornek@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" name="sifre" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Giriş Yap →</button>
        </form>

        <div class="divider"><span>veya</span></div>
        <a href="#" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google ile Giriş Yap
        </a>
    </div>
    <div class="footer-links">
        Hesabın yok mu? <a href="/kayit">Ücretsiz kaydol</a>
    </div>
    <a href="/" class="back">← Ana sayfaya dön</a>
</div>
</body>
</html>
